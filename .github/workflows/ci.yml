name: CI

on:
  push:
    branches: [ "master", "enhancement" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Build and Lint
      run: ./gradlew spotlessCheck assemble check --no-daemon

    - name: Run Tests
      run: ./gradlew test --no-daemon
